version: '3.7'
services:
  mysql:
    image: mysql:8
    container_name: mysql-deadline
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: user
      MYSQL_PASSWORD: pass
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql